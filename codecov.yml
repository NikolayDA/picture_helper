# Codecov-Konfiguration. Coverage wird bei jedem Push auf ``main``
# (coverage.yml, #293) sowie im woechentlichen Full-CI-Lauf erhoben und
# hochgeladen – jeweils Ubuntu/Python 3.12. Pull Requests laufen bewusst ueber
# die leichte PR-CI ohne Coverage. Damit Codecov auf PRs ohne eigenen Report
# keine blockierenden Status-Checks postet, sind die Checks rein informativ und
# der PR-Kommentar ist deaktiviert – Ziel ist allein das Badge.
coverage:
  status:
    project:
      default:
        informational: true
    patch:
      default:
        informational: true

comment: false
