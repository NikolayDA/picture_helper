document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

\"5.5\"><\u002Fcircle><\u002Fsvg>\n        <\u002Fdiv>\n        <div class=\"{{ darkenCls }}\" onclick=\"{{ onDarken }}\" title=\"Abdunkeln (tiefer)\">\n          <svg width=\"20\" height=\"20\" viewBox=\"0 0 20 20\" fill=\"currentColor\"><circle cx=\"10\" cy=\"10\" r=\"5.5\"><\u002Fcircle><\u002Fsvg>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n    <\u002Fdiv>\n\n    <!-- CANVAS -->\n    <div style=\"flex:1; position:relative; overflow:hidden; background:repeating-conic-gradient(var(--checker-a) 0% 25%, var(--checker-b) 0% 50%) 50% / 24px 24px;\">\n      <div style=\"{{ subjStyle }}\"><span style=\"font:600 12px ui-monospace,monospace; color:rgba(255,255,255,.62); letter-spacing:.04em; text-align:center; transform:rotate({{ counterAngle }}deg);\">{{ subjLabel }}<\u002Fspan><\u002Fdiv>\n      <sc-if value=\"{{ bgRemoved }}\">\n        <div style=\"position:absolute; top:14px; left:14px; padding:6px 12px; border-radius:20px; background:var(--good-soft); border:1px solid var(--good-line); color:var(--good); font:600 12px system-ui;\">✓ Hintergrund entfernt<\u002Fdiv>\n      <\u002Fsc-if>\n      <div style=\"position:absolute; bottom:14px; right:14px; display:flex; align-items:center; gap:2px; padding:4px; background:var(--glass); border:1px solid var(--border); border-radius:10px; backdrop-filter:blur(8px);\">\n        <span class=\"zoombtn\">−<\u002Fspan>\n        <span style=\"font:600 12px system-ui; color:var(--text-2); padding:0 4px;\">100%<\u002Fspan>\n        <span class=\"zoombtn\" style=\"font-size:16px;\">+<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- INSPECTOR -->\n    <div style=\"width:332px; background:var(--inspector); border-left:1px solid var(--border); display:flex; flex-direction:column; flex-shrink:0;\">\n      <div style=\"flex:1; overflow-y:auto; padding:20px 18px 18px;\">\n        <div style=\"font:700 16px system-ui; color:var(--text);\">{{ stepTitle }}<\u002Fdiv>\n        <div style=\"font:400 12.5px system-ui; color:var(--text-3); margin:5px 0 24px; line-height:1.45;\">{{ stepDesc }}<\u002Fdiv>\n\n        <!-- STEP 1 — Öffnen -->\n        <sc-if value=\"{{ isStep1 }}\" hint-placeholder-val=\"{{ true }}\">\n          <div class=\"drop\" onclick=\"{{ onOpen }}\" style=\"border:2px dashed var(--border-2); border-radius:12px; padding:34px 18px; text-align:center; cursor:pointer;\">\n            <div style=\"font:600 13.5px system-ui; color:var(--text-2);\">Bild hierher ziehen<\u002Fdiv>\n            <div style=\"font:400 12px system-ui; color:var(--text-3); margin-top:6px;\">PNG · JPEG · WebP · TIFF · BMP · GIF<\u002Fdiv>\n          <\u002Fdiv>\n          <button class=\"bp\" onclick=\"{{ onOpen }}\" style=\"margin-top:14px; margin-bottom:14px;\">Datei öffnen…<\u002Fbutton>\n          <div class=\"card\">\n            <div class=\"ch\"><b><\u002Fb><span>Zuletzt geöffnet<\u002Fspan><\u002Fdiv>\n            <div class=\"recent\" onclick=\"{{ onOpen }}\" style=\"display:flex; align-items:center; gap:10px; padding:9px 8px; border-radius:8px; cursor:pointer;\"><span style=\"width:30px; height:30px; border-radius:6px; background:linear-gradient(135deg,#4a5b7a,#3a4a63);\"><\u002Fspan><span style=\"font:500 12.5px system-ui; color:var(--text-2);\">logo_freisteller.png<\u002Fspan><\u002Fdiv>\n            <div class=\"recent\" onclick=\"{{ onOpen }}\" style=\"display:flex; align-items:center; gap:10px; padding:9px 8px; border-radius:8px; cursor:pointer;\"><span style=\"width:30px; height:30px; border-radius:6px; background:linear-gradient(135deg,#7a5b4a,#634a3a);\"><\u002Fspan><span style=\"font:500 12.5px system-ui; color:var(--text-2);\">produkt_motiv.jpg<\u002Fspan><\u002Fdiv>\n            <div class=\"recent\" onclick=\"{{ onOpen }}\" style=\"display:flex; align-items:center; gap:10px; padding:9px 8px; border-radius:8px; cursor:pointer;\"><span style=\"width:30px; height:30px; border-radius:6px; background:linear-gradient(135deg,#5b7a4a,#4a633a);\"><\u002Fspan><span style=\"font:500 12.5px system-ui; color:var(--text-2);\">relief_test.png<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <!-- STEP 2 — Freistellen -->\n        <sc-if value=\"{{ isStep2 }}\">\n          <button class=\"bp\" onclick=\"{{ onRemoveBg }}\" style=\"margin-bottom:14px;\">\n            <svg width=\"16\" height=\"16\" viewBox=\"0 0 20 20\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.7\" stroke-linecap=\"round\"><path d=\"M14 3 L14.9 5.2 L17 6 L14.9 6.8 L14 9 L13.1 6.8 L11 6 L13.1 5.2 Z\" fill=\"#fff\" stroke=\"none\"><\u002Fpath><line x1=\"4\" y1=\"16\" x2=\"11\" y2=\"9\"><\u002Fline><\u002Fsvg>\n            Hintergrund automatisch entfernen (KI)\n          <\u002Fbutton>\n          <div class=\"card\">\n            <div class=\"ch\"><b><\u002Fb><span>Werkzeug-Einstellungen<\u002Fspan><\u002Fdiv>\n            <label class=\"lab\">Toleranz (Zauberstab) · {{ tolerance }}<\u002Flabel>\n            <input type=\"range\" min=\"0\" max=\"100\" value=\"{{ tolerance }}\" oninput=\"{{ onTol }}\">\n            <label class=\"lab\" style=\"margin-top:14px;\">Pinselgröße · {{ brush }} px<\u002Flabel>\n            <input type=\"range\" min=\"2\" max=\"120\" value=\"{{ brush }}\" oninput=\"{{ onBrush2 }}\">\n          <\u002Fdiv>\n          <div class=\"card\">\n            <div class=\"ch\"><b><\u002Fb><span>Auswahl<\u002Fspan><\u002Fdiv>\n            <div class=\"row\"><button class=\"bs\" onclick=\"{{ onInvert }}\">Invertieren<\u002Fbutton><button class=\"bs\" onclick=\"{{ onClearSel }}\">Aufheben<\u002Fbutton><\u002Fdiv>\n            <div class=\"row\" style=\"margin-top:8px; align-items:center;\"><span style=\"font:600 12px system-ui; color:var(--text-3); width:34px; flex-shrink:0;\">2 px<\u002Fspan><button class=\"bs\" onclick=\"{{ onExpand }}\" style=\"background:var(--good-soft); border-color:transparent; color:var(--good);\">+ Erweitern<\u002Fbutton><button class=\"bs\" onclick=\"{{ onShrink }}\" style=\"background:var(--bad-soft); border-color:transparent; color:var(--bad);\">− Schrumpfen<\u002Fbutton><\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"card\">\n            <div class=\"ch\"><b><\u002Fb><span>Hintergrund<\u002Fspan><\u002Fdiv>\n            <button class=\"bs\" onclick=\"{{ onTransparent }}\" style=\"width:100%; flex:none; justify-content:flex-start; padding:0 14px; height:34px;\">Auswahl transparent machen<\u002Fbutton>\n            <div class=\"row\" style=\"margin-top:8px; align-items:center;\"><span style=\"width:34px; height:34px; border-radius:7px; background:#fff; border:1px solid var(--border-2); flex-shrink:0;\"><\u002Fspan><button class=\"bs\" onclick=\"{{ onReplaceColor }}\">Farbe ersetzen<\u002Fbutton><button class=\"bs\" onclick=\"{{ onFeather }}\">Kante glätten<\u002Fbutton><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <!-- STEP 3 — Anpassen -->\n        <sc-if value=\"{{ isStep3 }}\">\n          <div class=\"card\">\n            <div class=\"ch\"><b><\u002Fb><span>Farbkorrektur<\u002Fspan><\u002Fdiv>\n            <div style=\"font:400 12px system-ui; color:var(--text-3); margin:-2px 0 12px; line-height:1.45;\">Live-Vorschau auf der aktiven Ebene.<\u002Fdiv>\n            <label class=\"lab\">Helligkeit · {{ brightness }} %<\u002Flabel>\n            <input type=\"range\" min=\"0\" max=\"200\" value=\"{{ brightness }}\" oninput=\"{{ onBright }}\">\n            <label class=\"lab\" style=\"margin-top:14px;\">Kontrast · {{ contrast }} %<\u002Flabel>\n            <input type=\"range\" min=\"0\" max=\"200\" value=\"{{ contrast }}\" oninput=\"{{ onContrast }}\">\n            <label class=\"lab\" style=\"margin-top:14px;\">Sättigung · {{ saturation }} %<\u002Flabel>\n            <input type=\"range\" min=\"0\" max=\"200\" value=\"{{ saturation }}\" oninput=\"{{ onSat }}\">\n            <div class=\"row\" style=\"margin-top:16px;\"><button class=\"bs\" onclick=\"{{ onResetAdjust }}\">Zurücksetzen<\u002Fbutton><button class=\"bs\" onclick=\"{{ onApplyAdjust }}\" style=\"background:var(--accent-soft); border-color:transparent; color:var(--accent-text);\">Anwenden<\u002Fbutton><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <!-- STEP 4 — Form & Maße -->\n        <sc-if value=\"{{ isStep4 }}\">\n          <div class=\"card\">\n            <div class=\"ch\"><b><\u002Fb><span>Drehen<\u002Fspan><span class=\"v\">{{ angle }}°<\u002Fspan><\u002Fdiv>\n            <div class=\"row\" style=\"margin-bottom:11px;\"><button class=\"bs\" onclick=\"{{ onRotL }}\">↺ 90° links<\u002Fbutton><button class=\"bs\" onclick=\"{{ onRotR }}\">↻ 90° rechts<\u002Fbutton><\u002Fdiv>\n            <label class=\"lab\">Freier Winkel<\u002Flabel>\n            <input type=\"range\" min=\"-180\" max=\"180\" value=\"{{ angle }}\" oninput=\"{{ onAngle }}\">\n          <\u002Fdiv>\n          <div class=\"card\">\n            <div class=\"ch\"><b><\u002Fb><span>Spiegeln<\u002Fspan><\u002Fdiv>\n            <div class=\"row\"><button class=\"bs\" onclick=\"{{ onFlipH }}\">↔ Horizontal<\u002Fbutton><button class=\"bs\" onclick=\"{{ onFlipV }}\">↕ Vertikal<\u002Fbutton><\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"card\">\n            <div class=\"ch\"><b><\u002Fb><span>Ecken abrunden<\u002Fspan><span class=\"v\">{{ radius }} px<\u002Fspan><\u002Fdiv>\n            <input type=\"range\" min=\"0\" max=\"80\" value=\"{{ radius }}\" oninput=\"{{ onRadius }}\" style=\"margin-top:2px;\">\n          <\u002Fdiv>\n          <div class=\"card\">\n            <div class=\"ch\"><b><\u002Fb><span>Größe ändern<\u002Fspan><\u002Fdiv>\n            <div class=\"row\" style=\"align-items:center;\"><input class=\"num numw\" type=\"number\" value=\"{{ w }}\" oninput=\"{{ onW }}\"><span style=\"color:var(--muted);\">×<\u002Fspan><input class=\"num numw\" type=\"number\" value=\"{{ h }}\" oninput=\"{{ onH }}\"><span style=\"font:500 12px system-ui; color:var(--text-3);\">px<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"card\">\n            <div class=\"ch\"><b><\u002Fb><span>Zuschnitt-Format<\u002Fspan><\u002Fdiv>\n            <div style=\"display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px;\">\n              <sc-for list=\"{{ formats }}\" as=\"f\" hint-placeholder-count=\"6\">\n                <button class=\"{{ f.cls }}\" onclick=\"{{ f.onClick }}\" style=\"height:34px; border-radius:8px; font:500 12px system-ui; cursor:pointer;\">{{ f.label }}<\u002Fbutton>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <!-- STEP 5 — Relief & Ebenen -->\n        <sc-if value=\"{{ isStep5 }}\">\n          <div class=\"card\">\n            <div class=\"ch\"><b><\u002Fb><span>Ebenen<\u002Fspan><\u002Fdiv>\n            <div class=\"row\" style=\"margin-bottom:10px;\"><button class=\"bs\" onclick=\"{{ onAddLayer }}\">+ Neu<\u002Fbutton><button class=\"bs\" onclick=\"{{ onDupLayer }}\">Duplizieren<\u002Fbutton><button class=\"bs\" onclick=\"{{ onDelLayer }}\">Löschen<\u002Fbutton><\u002Fdiv>\n            <sc-for list=\"{{ layerRows }}\" as=\"l\" hint-placeholder-count=\"1\">\n              <div class=\"{{ l.cls }}\" onclick=\"{{ l.onClick }}\">\n                <span style=\"width:22px; height:22px; border-radius:5px; background:linear-gradient(135deg,#4a5b7a,#3a4a63);\"><\u002Fspan>\n                <span style=\"flex:1; font:500 12.5px system-ui; color:var(--text);\">{{ l.name }}<\u002Fspan>\n                <span style=\"font:500 11.5px system-ui; color:var(--text-3);\">{{ l.role }}<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n            <label class=\"lab\" style=\"margin-top:16px;\">Deckkraft · {{ activeOpacity }} %<\u002Flabel>\n            <input type=\"range\" min=\"0\" max=\"100\" value=\"{{ activeOpacity }}\" oninput=\"{{ onOpacity }}\">\n            <label class=\"lab\" style=\"margin-top:14px;\">Rolle der Ebene<\u002Flabel>\n            <select class=\"num\" style=\"width:100%; height:34px; margin-top:8px;\" value=\"{{ activeRole }}\" onchange=\"{{ onRole }}\">\n              <option>Keine<\u002Foption><option>Farbe<\u002Foption><option>Höhe<\u002Foption><option>Gloss<\u002Foption>\n            <\u002Fselect>\n          <\u002Fdiv>\n          <div class=\"card\">\n            <div class=\"ch\"><b><\u002Fb><span>Höhenkarte<\u002Fspan><\u002Fdiv>\n            <button class=\"bp\" onclick=\"{{ onGenHeight }}\">{{ heightLabel }}<\u002Fbutton>\n            <div class=\"row\" style=\"margin-top:10px;\"><button class=\"bs\" onclick=\"{{ onOptimize }}\">Tonwert optimieren<\u002Fbutton><button class=\"bs\" onclick=\"{{ onInvertHeight }}\">Invertieren<\u002Fbutton><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <!-- STEP 6 — Export -->\n        <sc-if value=\"{{ isStep6 }}\">\n          <div class=\"card\">\n            <div class=\"ch\"><b><\u002Fb><span>2D-Vorschau prüfen<\u002Fspan><\u002Fdiv>\n            <div style=\"display:flex; gap:3px; padding:3px; background:var(--inset); border:1px solid var(--border); border-radius:9px; margin-bottom:10px;\">\n              <span class=\"{{ pvFarbe }}\" onclick=\"{{ onPvFarbe }}\">Farbe<\u002Fspan>\n              <span class=\"{{ pvRelief }}\" onclick=\"{{ onPvRelief }}\">Relief<\u002Fspan>\n              <span class=\"{{ pvHoehe }}\" onclick=\"{{ onPvHoehe }}\">Höhe<\u002Fspan>\n              <span class=\"{{ pvGloss }}\" onclick=\"{{ onPvGloss }}\">Gloss<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"font:400 12px system-ui; color:var(--text-3); line-height:1.45;\">Nur Anzeige — der Bildexport bleibt das Farbmotiv.<\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"card\">\n            <div class=\"ch\"><b><\u002Fb><span>Speichern<\u002Fspan><\u002Fdiv>\n            <label class=\"lab\">Dateiformat<\u002Flabel>\n            <div style=\"display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-top:8px;\">\n              <sc-for list=\"{{ formatRows }}\" as=\"f\" hint-placeholder-count=\"4\">\n                <button class=\"{{ f.cls }}\" onclick=\"{{ f.onClick }}\" style=\"height:34px; border-radius:8px; font:500 12.5px system-ui; cursor:pointer;\">{{ f.label }}<\u002Fbutton>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n            <button class=\"bp\" onclick=\"{{ onSave }}\" style=\"margin-top:12px;\">Bild speichern<\u002Fbutton>\n          <\u002Fdiv>\n          <div class=\"card\">\n            <div class=\"ch\"><b><\u002Fb><span>UV-Druck<\u002Fspan><\u002Fdiv>\n            <button class=\"bs\" onclick=\"{{ onEufy }}\" style=\"width:100%; flex:none; height:40px; white-space:normal; line-height:1.25; text-align:center;\">Assets für EufyMake Studio exportieren…<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n      <!-- guided nav -->\n      <div style=\"height:62px; border-top:1px solid var(--border); display:flex; align-items:center; gap:10px; padding:0 18px; background:var(--nav); flex-shrink:0;\">\n        <button onclick=\"{{ onPrev }}\" style=\"height:38px; padding:0 14px; border:1px solid var(--border-2); border-radius:9px; background:transparent; color:{{ prevColor }}; font:500 13px system-ui; cursor:{{ prevCursor }};\">← Zurück<\u002Fbutton>\n        <button onclick=\"{{ onNext }}\" style=\"flex:1; height:38px; border:none; border-radius:9px; background:var(--accent); color:#fff; font:600 13px system-ui; cursor:pointer; box-shadow:0 3px 10px var(--accent-shadow);\">{{ nextLabel }}<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <!-- status -->\n  <div style=\"height:26px; display:flex; align-items:center; padding:0 14px; background:var(--status); border-top:1px solid var(--border); font:400 11.5px system-ui; color:var(--text-3); flex-shrink:0;\">{{ status }}<\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:&quot;100%&quot;,&quot;height&quot;:&quot;100%&quot;}}\">\nclass Component extends DCLogic {\n  state = {\n    step: 1, loaded: false, tool: 'wand', theme: 'dark', openMenu: null,\n    tolerance: 30, brush: 30, bgRemoved: false,\n    brightness: 100, contrast: 100, saturation: 100,\n    angle: 0, flipH: false, flipV: false, radius: 0, crop: '',\n    w: 1200, h: 900,\n    layers: [{ name: 'Ebene 1', opacity: 100, role: 'Keine' }], active: 0,\n    heightGen: false, preview: 'Farbe', format: 'PNG',\n    status: 'Kein Bild geladen — Schritt 1: Bild öffnen',\n  };\n\n  st(p) { this.setState(p); }\n  load() { this.setState({ loaded: true, step: 2, status: 'beispiel.png geladen · 1200×900 px' }); }\n  go(n) { if (!this.state.loaded && n !== 1) return; this.setState({ step: n }); }\n  next() {\n    const s = this.state;\n    if (s.step === 1 && !s.loaded) { this.load(); return; }\n    if (s.step < 6) this.setState({ step: s.step + 1 });\n    else this.setState({ status: '✓ Export abgeschlossen — Assets bereit' });\n  }\n  prev() { if (this.state.step > 1) this.setState({ step: this.state.step - 1 }); }\n  setTool(t) { this.setState({ tool: t, status: 'Werkzeug aktiv: ' + t }); }\n\n  rotate(d) { this.setState({ angle: ((this.state.angle + d) % 360 + 360) % 360, status: 'Gedreht um ' + d + '°' }); }\n  flip(ax) {\n    if (ax === 'h') this.setState({ flipH: !this.state.flipH, status: 'Horizontal gespiegelt' });\n    else this.setState({ flipV: !this.state.flipV, status: 'Vertikal gespiegelt' });\n  }\n\n  addLayer() {\n    const ls = this.state.layers.slice();\n    ls.push({ name: 'Ebene ' + (ls.length + 1), opacity: 100, role: 'Keine' });\n    this.setState({ layers: ls, active: ls.length - 1, status: 'Ebene hinzugefügt' });\n  }\n  dupLayer() {\n    const ls = this.state.layers.slice(); const a = this.state.active;\n    ls.splice(a + 1, 0, { ...ls[a], name: ls[a].name + ' Kopie' });\n    this.setState({ layers: ls, active: a + 1, status: 'Ebene dupliziert' });\n  }\n  delLayer() {\n    if (this.state.layers.length <= 1) return;\n    const ls = this.state.layers.slice(); ls.splice(this.state.active, 1);\n    this.setState({ layers: ls, active: Math.max(0, this.state.active - 1), status: 'Ebene gelöscht' });\n  }\n  setOpacity(v) {\n    const ls = this.state.layers.slice(); ls[this.state.active] = { ...ls[this.state.active], opacity: v };\n    this.setState({ layers: ls });\n  }\n  setRole(v) {\n    const ls = this.state.layers.slice(); ls[this.state.active] = { ...ls[this.state.active], role: v };\n    this.setState({ layers: ls, status: 'Rolle gesetzt: ' + v });\n  }\n\n  renderVals() {\n    const s = this.state;\n    const cur = s.step;\n    const isLight = s.theme === 'light';\n\n    // canvas subject style\n    let f = `brightness(${s.brightness}%) contrast(${s.contrast}%) saturate(${s.saturation}%)`;\n    if (s.preview === 'Höhe') f += ' grayscale(1)';\n    if (s.preview === 'Relief') f += ' contrast(140%) brightness(92%)';\n    if (s.preview === 'Gloss') f += ' brightness(115%) saturate(125%)';\n    const tr = `translate(-50%,-50%) rotate(${s.angle}deg) scaleX(${s.flipH ? -1 : 1}) scaleY(${s.flipV ? -1 : 1})`;\n    let bg = 'linear-gradient(135deg,#48526e,#39485f)';\n    if (s.preview === 'Gloss') bg = 'linear-gradient(135deg,#5a6c92,#43536f)';\n    const subjStyle = `position:absolute;left:50%;top:50%;transform:${tr};width:360px;height:296px;`\n      + `border-radius:${s.radius}px;background:${bg};box-shadow:0 12px 44px rgba(0,0,0,.45);`\n      + `filter:${f};opacity:${(s.layers[s.active]?.opacity ?? 100) / 100};`\n      + (cur === 2 && !s.bgRemoved ? 'outline:2px dashed var(--accent);outline-offset:5px;' : '')\n      + 'display:flex;align-items:center;justify-content:center;transition:transform .25s ease, border-radius .2s, filter .2s;';\n\n    const subjLabel = cur === 6 ? ('Vorschau: ' + s.preview) : 'motiv.png';\n\n    // stepper\n    const labels = ['Öffnen', 'Freistellen', 'Anpassen', 'Form & Maße', 'Relief & Ebenen', 'Export'];\n    const steps = labels.map((label, i) => {\n      const num = i + 1; const done = num < cur; const active = num === cur;\n      return {\n        num, label, numText: done ? '✓' : String(num),\n        circleCls: 'scircle' + (done ? ' done' : active ? ' active' : ''),\n        labelCls: 'slabel' + (done ? ' done' : active ? ' active' : ''),\n        connCls: 'sconn' + (num <= cur ? ' fill' : '') + (num === 1 ? ' first' : ''),\n        onClick: () => this.go(num),\n      };\n    });\n\n    const tc = (t) => 'tool' + (s.tool === t ? ' on' : '');\n\n    const titles = {\n      1: 'Schritt 1 · Öffnen', 2: 'Schritt 2 · Freistellen', 3: 'Schritt 3 · Anpassen',\n      4: 'Schritt 4 · Form & Maße', 5: 'Schritt 5 · Relief & Ebenen', 6: 'Schritt 6 · Export',\n    };\n    const descs = {\n      1: 'Bild laden — per Drag & Drop, Dialog oder zuletzt geöffnet.',\n      2: 'Motiv vom Hintergrund trennen — automatisch oder von Hand.',\n      3: 'Helligkeit, Kontrast und Sättigung mit Live-Vorschau.',\n      4: 'Drehen, spiegeln, abrunden, zuschneiden und skalieren.',\n      5: 'Ebenen verwalten und die Höhenkarte für den Reliefdruck.',\n      6: 'Ergebnis prüfen, speichern oder für EufyMake exportieren.',\n    };\n    const nextLabels = {\n      1: 'Weiter: Freistellen →', 2: 'Weiter: Anpassen →', 3: 'Weiter: Form & Maße →',\n      4: 'Weiter: Relief & Ebenen →', 5: 'Weiter: Export →', 6: 'Exportieren ✓',\n    };\n\n    // crop formats\n    const fmts = ['Kreis', '1:1', '16:9', '4:3', '9:16', '3:4'];\n    const formats = fmts.map((label) => ({\n      label, cls: s.crop === label ? 'bs sel' : 'bs',\n      onClick: () => this.setState({ crop: label, status: 'Format gewählt: ' + label }),\n    }));\n\n    // layers\n    const layerRows = s.layers.map((l, i) => ({\n      name: l.name, role: l.role, cls: 'lrow' + (i === s.active ? ' on' : ''),\n      onClick: () => this.setState({ active: i }),\n    }));\n\n    // save formats\n    const sfmts = ['PNG', 'JPEG', 'WebP', 'TIFF'];\n    const formatRows = sfmts.map((label) => ({\n      label, cls: s.format == enMenu === name,\n      openCls: openMenu === name ? 'open' : '',\n      onClick: () => this.setState({ openMenu: this.state.openMenu === name ? null : name }),\n      onHover: () => { if (this.state.openMenu && this.state.openMenu !== name) this.setState({ openMenu: name }); },\n    }));\n\n    return {\n      themeCls: isLight ? 'light' : '',\n      menus, anyMenuOpen: !!openMenu, closeMenus: closeM,\n      themeLabel: isLight ? 'Dunkel' : 'Hell',\n      toggleTheme: () => this.setState({ theme: isLight ? 'dark' : 'light', status: isLight ? 'Dunkles Design aktiv' : 'Helles Design aktiv' }),\n      fileName: s.loaded ? 'beispiel.png' : '—',\n      subjStyle, subjLabel, counterAngle: -s.angle, bgRemoved: s.bgRemoved,\n      steps,\n      stepTitle: titles[cur], stepDesc: descs[cur], nextLabel: nextLabels[cur],\n      isStep1: cur === 1, isStep2: cur === 2, isStep3: cur === 3, isStep4: cur === 4, isStep5: cur === 5, isStep6: cur === 6,\n      status: s.status,\n      // nav\n      onNext: () => this.next(), onPrev: () => this.prev(),\n      prevColor: cur === 1 ? 'var(--muted)' : 'var(--text-2)', prevCursor: cur === 1 ? 'default' : 'pointer',\n      undo: () => this.setState({ status: 'Rückgängig' }),\n      // tools\n      moveCls: tc('move'), wandCls: tc('wand'), brushCls: tc('brush'), eraserCls: tc('eraser'), lassoCls: tc('lasso'),\n      lightenCls: tc('lighten'), darkenCls: tc('darken'),\n      showSelTools: cur === 2, showHeightTools: cur === 5,\n      onMove: () => this.setTool('move'), onWand: () => this.setTool('wand'), onBrush: () => this.setTool('brush'),\n      onEraser: () => this.setTool('eraser'), onLasso: () => this.setTool('lasso'),\n      onLighten: () => this.setTool('lighten'), onDarken: () => this.setTool('darken'),\n      // step 1\n      onOpen: () => this.load(),\n      // step 2\n      tolerance: s.tolerance, brush: s.brush,\n      onTol: (e) => this.setState({ tolerance: +e.target.value }),\n      onBrush2: (e) => this.setState({ brush: +e.t
