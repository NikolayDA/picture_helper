name: Codex Security Scan

# Ausschliesslich manuell (#551): CodeQL (codeql.yml) traegt die
# automatisierte SAST-Grundabdeckung; dieser Workflow bleibt fuer
# repo-spezifische, semantische Pruefungen (Bild-/Projektdatei-Grenzen,
# Pfad-/Temp-Verhalten, Worker-/Prozessgrenzen, Packaging-/Release-/
# CI-Vertrauensgrenzen) erhalten, laeuft aber nur noch auf Zuruf – kein
# Zeitplan, kein Push-/PR-Trigger. Der frueher hier vorhandene 14-Tage-
# Cadence-Pfad (Anchor-Datum, cadence-Job) und die Enable-/Disable-Schalter
# (CODEX_SECURITY_SCAN_ENABLED-Variable, run_scan-Dry-Skip) sind fuer einen
# rein manuellen Trigger redundant: Wer nicht scannen will, startet den
# workflow_dispatch schlicht nicht. Beide entfallen ersatzlos.
on:
  workflow_dispatch:
    inputs:
      min_severity:
        description: 'Lowest severity that should create issues'
        type: choice
        options: [low, medium, high, critical]
        default: low

permissions:
  contents: read

concurrency:
  group: codex-security-scan
  cancel-in-progress: false

jobs:
  scan:
    name: Run Codex scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Check OpenAI API key
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "::error::OPENAI_API_KEY repository secret is required for openai/codex-action."
            exit 1
          fi

      - name: Run manual security scan
        id: codex_security
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt-file: .github/codex/security-scan-prompt.md
          output-schema-file: .github/codex/security-findings.schema.json
          output-file: codex-security-findings.json
          sandbox: read-only
          safety-strategy: read-only
          allow-bots: true
          effort: high

      - name: Validate scan JSON
        run: |
          python3 -m json.tool codex-security-findings.json >/dev/null
          python3 - <<'PY'
          import json
          from pathlib import Path

          data = json.loads(Path("codex-security-findings.json").read_text(encoding="utf-8"))
          if not isinstance(data.get("findings"), list):
              raise SystemExit("codex-security-findings.json must contain a findings array")
          print(f"findings={len(data['findings'])}")
          PY

      - name: Upload scan JSON
        uses: actions/upload-artifact@v7
        with:
          name: codex-security-findings
          path: codex-security-findings.json
          if-no-files-found: error

  create-issues:
    name: Create GitHub issues
    needs: scan
    if: needs.scan.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Download scan JSON
        uses: actions/download-artifact@v8
        with:
          name: codex-security-findings

      - name: Create or reuse security issues
        env:
          GITHUB_TOKEN: ${{ github.token }}
          SECURITY_SCAN_MIN_SEVERITY: ${{ inputs.min_severity }}
        run: |
          python3 scripts/create_security_scan_issues.py \
            codex-security-findings.json \
            --results security-issue-results.json

      - name: Upload issue sync results
        uses: actions/upload-artifact@v7
        with:
          name: codex-security-issue-results
          path: security-issue-results.json
          if-no-files-found: error
