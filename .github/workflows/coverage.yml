name: Coverage

# Frische Coverage-Zahlen fuer das Badge + Patch-Coverage (#293). Laeuft bei
# jedem Push auf ``main`` als EINZELNER, leichter Job (Ubuntu/Python 3.12) –
# bewusst NICHT in der PR-CI, damit Pull Requests schnell bleiben (make
# pr-check, ohne Coverage). Der woechentliche Full-CI-Lauf laedt weiterhin
# ebenfalls hoch; dieser Push-Trigger haelt das Badge zwischen den Wochenlaeufen
# aktuell. Codecov hat IP-basierte tokenlose Uploads abgeschafft ("Token
# required - not valid tokenless upload"); der secret-freie Ersatz ist OIDC.
# Dafuer braucht der Job ``id-token: write`` und der Codecov-Step ``use_oidc:
# true`` – so wird ein GitHub-OIDC-Token angefordert, statt einen leeren
# ``CODECOV_TOKEN`` als (abgelehnten) tokenlosen Upload zu versuchen (#292).
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  # OIDC-Token fuer den tokenlosen Codecov-Upload (use_oidc: true).
  id-token: write

concurrency:
  # Pro Branch nur ein laufender Upload; aeltere Push-Laeufe abbrechen, da nur
  # die jeweils neuesten Zahlen das Badge fuettern.
  group: coverage-${{ github.ref }}
  cancel-in-progress: true

jobs:
  coverage:
    name: Coverage upload (push to main)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: "Upgrade pip to a patched release (security: pip>=26.1.2)"
        run: python -m pip install --upgrade "pip>=26.1.2"

      # Qt-Systembibliotheken: make coverage fuehrt die Test-Suite aus, die
      # PyQt6 importiert; ohne libgl1/libegl1 scheitert bereits der Import
      # (libGL.so.1). Liste identisch zu den anderen Qt-installierenden Dateien
      # halten (Befund N6, tests/test_ci_qt_packages.py).
      - name: System packages for Qt + zsh + shellcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libegl1 libgl1 libfontconfig1 libxkbcommon0 libdbus-1-3 \
            libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-randr0 \
            libxcb-render-util0 libxcb-shape0 libxcb-xinerama0 libxcb-xkb1 \
            zsh shellcheck

      - name: Install package and test extra
        run: make install-test

      - name: Coverage
        run: make coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          use_oidc: true
          files: ./coverage.xml
          fail_ci_if_error: false
