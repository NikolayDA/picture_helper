name: Release-Abnahme (Self-hosted Hardware)

# Sammelt die Release-Abnahme-Evidenz (Issue #595, Epic #639) auf Self-hosted
# Runnern echter Zielhardware. Betrieb: docs/RELEASE_AUTOMATION.md, Vertrag:
# docs/history/ADR-2026-release-abnahme-automatisierung.md.
#
# Sicherheitsmodell (verbindlich): ausschliesslich workflow_dispatch – nie
# push/pull_request/Fork; Least-Privilege-Permissions (nur Lesen); keine
# Secrets in den Smoke-Steps (persist-credentials: false, Dispatch-Inputs nur
# ueber env). Schreibrechte erst im Aggregations-Job (#646).

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release-Tag der zu pruefenden Assets (z. B. v2.7.0). Genau eine Quelle.'
        type: string
        default: ''
      run_id:
        description: 'Run-ID eines release-linux.yml-Laufs (Kandidat vor dem Tag). Genau eine Quelle.'
        type: string
        default: ''
      platforms:
        description: 'Zielplattformen'
        type: choice
        options:
          - alle
          - macos-arm64
          - linux-arm64
          - linux-x86_64
        default: alle
      dry_run:
        description: 'Nur Smokes, ohne Auswertung (Vision/Aggregation, #646)'
        type: boolean
        default: false
      target_issue:
        description: 'Issue fuer den Kommentar mit der Abschlussmatrix'
        type: string
        default: '595'

permissions:
  contents: read
  actions: read

concurrency:
  # Kein paralleler Abnahme-Lauf auf denselben Geraeten.
  group: release-abnahme
  cancel-in-progress: false

jobs:
  abnahme-macos-arm64:
    name: Abnahme macOS arm64
    if: inputs.platforms == 'alle' || inputs.platforms == 'macos-arm64'
    runs-on: [self-hosted, macOS, ARM64]
    timeout-minutes: 30
    steps:
      # persist-credentials: false – kein GITHUB_TOKEN in der Git-Config, waehrend
      # spaeter ein heruntergeladenes Artefakt ausgefuehrt wird (Smoke-Grenze).
      - uses: actions/checkout@v5
        with:
          persist-credentials: false
      - name: Grafische Runner-Session pruefen
        shell: bash
        run: |
          set -euo pipefail
          runner_user="$(id -un)"
          console_user="$(stat -f '%Su' /dev/console)"
          if [ "$runner_user" != "$console_user" ]; then
            echo "::error::Runner-Benutzer $runner_user ist nicht der angemeldete Konsolenbenutzer $console_user. Der Runner muss als LaunchAgent in dessen GUI-Sitzung laufen."
            exit 1
          fi
      - name: Abnahme-venv (PyQt6 fuer die Probes)
        run: |
          python3 -m venv "${RUNNER_TEMP}/abnahme-venv"
          "${RUNNER_TEMP}/abnahme-venv/bin/python" -m pip install --upgrade "pip>=26.1.2"
          "${RUNNER_TEMP}/abnahme-venv/bin/python" -m pip install \
            -e ".[test]" -c requirements/constraints.txt
      - name: Artefakte beziehen und Evidenz anlegen
        env:
          GITHUB_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.release_tag }}
          RUN_ID: ${{ inputs.run_id }}
        run: |
          set -euo pipefail
          args=()
          [ -n "$RELEASE_TAG" ] && args+=(--release-tag "$RELEASE_TAG")
          [ -n "$RUN_ID" ] && args+=(--source-run-id "$RUN_ID")
          "${RUNNER_TEMP}/abnahme-venv/bin/python" scripts/release_abnahme.py \
            --platform macos-arm64 "${args[@]}" \
            --output "${RUNNER_TEMP}/abnahme-macos-arm64"
      - name: DMG-Smoke inkl. Retina- und nativem 3D-Nachweis (#643/#648)
        run: |
          set -euo pipefail
          unset QT_QPA_PLATFORM
          # devicePixelRatio des Hauptfensters ermitteln (nativer Qt-Kontext).
          scale="$("${RUNNER_TEMP}/abnahme-venv/bin/python" scripts/abnahme_scale_probe.py)"
          "${RUNNER_TEMP}/abnahme-venv/bin/python" scripts/abnahme_smoke.py \
            --platform macos-arm64 \
            --evidence-dir "${RUNNER_TEMP}/abnahme-macos-arm64" \
            --scale-factor "$scale"
      - name: Native E2E-Regression inkl. 3D-Ready-Nachweis (#644)
        env:
          ABNAHME_EVIDENCE_DIR: ${{ runner.temp }}/abnahme-macos-arm64
          ABNAHME_PLATFORM: macos-arm64
          ABNAHME_REQUIRE_NATIVE_3D: '1'
        run: |
          set -euo pipefail
          unset QT_QPA_PLATFORM
          "${RUNNER_TEMP}/abnahme-venv/bin/python" -m pytest -q \
            tests/test_e2e_release_regression.py
      - name: Live-GL-Performance-Suite (#645)
        run: |
          set -euo pipefail
          unset QT_QPA_PLATFORM
          "${RUNNER_TEMP}/abnahme-venv/bin/python" scripts/benchmark.py run \
            --suite preview3d-live --require-gl --no-compare --iterations 3 \
            --platform macos-arm64 \
            --results-dir "${RUNNER_TEMP}/abnahme-macos-arm64/preview3d-live"
      - uses: actions/upload-artifact@v6
        if: always()
        with:
          name: abnahme-macos-arm64
          path: ${{ runner.temp }}/abnahme-macos-arm64/
          if-no-files-found: error

  abnahme-linux-arm64:
    name: Abnahme Linux aarch64
    if: inputs.platforms == 'alle' || inputs.platforms == 'linux-arm64'
    runs-on: [self-hosted, Linux, ARM64]
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false
      - name: Grafische Runner-Session pruefen
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${DISPLAY:-}" ] && [ -z "${WAYLAND_DISPLAY:-}" ]; then
            echo "::error::Weder DISPLAY noch WAYLAND_DISPLAY ist gesetzt. Der Runner muss in der angemeldeten grafischen Sitzung laufen."
            exit 1
          fi
          if [ -n "${WAYLAND_DISPLAY:-}" ] && [ -z "${XDG_RUNTIME_DIR:-}" ]; then
            echo "::error::WAYLAND_DISPLAY ist gesetzt, aber XDG_RUNTIME_DIR fehlt."
            exit 1
          fi
      - name: Abnahme-venv (PyQt6 fuer die Probes)
        run: |
          python3 -m venv "${RUNNER_TEMP}/abnahme-venv"
          "${RUNNER_TEMP}/abnahme-venv/bin/python" -m pip install --upgrade "pip>=26.1.2"
          "${RUNNER_TEMP}/abnahme-venv/bin/python" -m pip install \
            -e ".[test]" -c requirements/constraints.txt
      - name: Artefakte beziehen und Evidenz anlegen
        env:
          GITHUB_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.release_tag }}
          RUN_ID: ${{ inputs.run_id }}
        run: |
          set -euo pipefail
          args=()
          [ -n "$RELEASE_TAG" ] && args+=(--release-tag "$RELEASE_TAG")
          [ -n "$RUN_ID" ] && args+=(--source-run-id "$RUN_ID")
          "${RUNNER_TEMP}/abnahme-venv/bin/python" scripts/release_abnahme.py \
            --platform linux-arm64 "${args[@]}" \
            --output "${RUNNER_TEMP}/abnahme-linux-arm64"
      - name: AppImage- und .deb-Smoke inkl. GL-Provenance und nativem 3D-Nachweis (#642/#648)
        run: |
          set -euo pipefail
          unset QT_QPA_PLATFORM
          "${RUNNER_TEMP}/abnahme-venv/bin/python" scripts/abnahme_smoke.py \
            --platform linux-arm64 \
            --evidence-dir "${RUNNER_TEMP}/abnahme-linux-arm64"
      - name: Native E2E-Regression inkl. 3D-Ready-Nachweis (#644)
        env:
          ABNAHME_EVIDENCE_DIR: ${{ runner.temp }}/abnahme-linux-arm64
          ABNAHME_PLATFORM: linux-arm64
          ABNAHME_REQUIRE_NATIVE_3D: '1'
        run: |
          set -euo pipefail
          unset QT_QPA_PLATFORM
          "${RUNNER_TEMP}/abnahme-venv/bin/python" -m pytest -q \
            tests/test_e2e_release_regression.py
      - name: Live-GL-Performance-Suite (#645)
        run: |
          set -euo pipefail
          unset QT_QPA_PLATFORM
          "${RUNNER_TEMP}/abnahme-venv/bin/python" scripts/benchmark.py run \
            --suite preview3d-live --require-gl --no-compare --iterations 3 \
            --platform linux-arm64 \
            --results-dir "${RUNNER_TEMP}/abnahme-linux-arm64/preview3d-live"
      - uses: actions/upload-artifact@v6
        if: always()
        with:
          name: abnahme-linux-arm64
          path: ${{ runner.temp }}/abnahme-linux-arm64/
          if-no-files-found: error

  # Linux x86_64 ist bis auf weiteres pausiert (kein GPU-Hardwarezugang,
  # Entscheidung 2026-07-20). Der Job bleibt vollstaendig definiert, laeuft aber
  # nur, wenn die Repository-Variable ABNAHME_X86_64_ENABLED == 'true' ist.
  # Reaktivierung ohne Code-Aenderung: siehe docs/RELEASE_AUTOMATION.md §5.
  abnahme-linux-x86_64:
    name: Abnahme Linux x86_64
    if: >-
      (inputs.platforms == 'alle' || inputs.platforms == 'linux-x86_64')
      && vars.ABNAHME_X86_64_ENABLED == 'true'
    runs-on: [self-hosted, Linux, X64]
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false
      - name: Grafische Runner-Session pruefen
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${DISPLAY:-}" ] && [ -z "${WAYLAND_DISPLAY:-}" ]; then
            echo "::error::Weder DISPLAY noch WAYLAND_DISPLAY ist gesetzt. Der Runner muss in der angemeldeten grafischen Sitzung laufen."
            exit 1
          fi
          if [ -n "${WAYLAND_DISPLAY:-}" ] && [ -z "${XDG_RUNTIME_DIR:-}" ]; then
            echo "::error::WAYLAND_DISPLAY ist gesetzt, aber XDG_RUNTIME_DIR fehlt."
            exit 1
          fi
      - name: Abnahme-venv (PyQt6 fuer die Probes)
        run: |
          python3 -m venv "${RUNNER_TEMP}/abnahme-venv"
          "${RUNNER_TEMP}/abnahme-venv/bin/python" -m pip install --upgrade "pip>=26.1.2"
          "${RUNNER_TEMP}/abnahme-venv/bin/python" -m pip install \
            -e ".[test]" -c requirements/constraints.txt
      - name: Artefakte beziehen und Evidenz anlegen
        env:
          GITHUB_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.release_tag }}
          RUN_ID: ${{ inputs.run_id }}
        run: |
          set -euo pipefail
          args=()
          [ -n "$RELEASE_TAG" ] && args+=(--release-tag "$RELEASE_TAG")
          [ -n "$RUN_ID" ] && args+=(--source-run-id "$RUN_ID")
          "${RUNNER_TEMP}/abnahme-venv/bin/python" scripts/release_abnahme.py \
            --platform linux-x86_64 "${args[@]}" \
            --output "${RUNNER_TEMP}/abnahme-linux-x86_64"
      - name: AppImage- und .deb-Smoke inkl. GL-Provenance und nativem 3D-Nachweis (#642/#648)
        run: |
          set -euo pipefail
          unset QT_QPA_PLATFORM
          "${RUNNER_TEMP}/abnahme-venv/bin/python" scripts/abnahme_smoke.py \
            --platform linux-x86_64 \
            --evidence-dir "${RUNNER_TEMP}/abnahme-linux-x86_64"
      - name: Native E2E-Regression inkl. 3D-Ready-Nachweis (#644)
        env:
          ABNAHME_EVIDENCE_DIR: ${{ runner.temp }}/abnahme-linux-x86_64
          ABNAHME_PLATFORM: linux-x86_64
          ABNAHME_REQUIRE_NATIVE_3D: '1'
        run: |
          set -euo pipefail
          unset QT_QPA_PLATFORM
          "${RUNNER_TEMP}/abnahme-venv/bin/python" -m pytest -q \
            tests/test_e2e_release_regression.py
      - name: Live-GL-Performance-Suite (#645)
        run: |
          set -euo pipefail
          unset QT_QPA_PLATFORM
          "${RUNNER_TEMP}/abnahme-venv/bin/python" scripts/benchmark.py run \
            --suite preview3d-live --require-gl --no-compare --iterations 3 \
            --platform linux-x86_64 \
            --results-dir "${RUNNER_TEMP}/abnahme-linux-x86_64/preview3d-live"
      - uses: actions/upload-artifact@v6
        if: always()
        with:
          name: abnahme-linux-x86_64
          path: ${{ runner.temp }}/abnahme-linux-x86_64/
          if-no-files-found: error

  # Sichtbarer Hinweis, wenn x86_64 pausiert ist – laeuft auf GitHub-hosted, weil
  # ein passender Self-hosted Runner gerade fehlen kann. So faellt der pausierte
  # Pfad nie still weg (ADR-Prinzip: pausiert, nicht erfuellt statt unsichtbar).
  hinweis-x86_64-pausiert:
    name: Hinweis Linux x86_64 pausiert
    if: >-
      (inputs.platforms == 'alle' || inputs.platforms == 'linux-x86_64')
      && vars.ABNAHME_X86_64_ENABLED != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Pause protokollieren
        run: |
          echo "::notice title=Linux x86_64 pausiert::Der x86_64-Hardware-Smoke ist pausiert (kein GPU-Zugang, Entscheidung 2026-07-20). Reaktivierung: docs/RELEASE_AUTOMATION.md §5 – ABNAHME_X86_64_ENABLED=true setzen."

  # Aggregation: sammelt alle Evidenzen, bewertet Screenshots (Vision, fail-safe)
  # und postet die Abschlussmatrix als Kommentar. Schreibrechte NUR hier; die
  # Smoke-Jobs bleiben read-only (Sicherheitsmodell #640). Go/No-Go bleibt
  # menschlich (#646).
  aggregation:
    name: Abschlussmatrix
    needs: [abnahme-macos-arm64, abnahme-linux-arm64, abnahme-linux-x86_64]
    if: always() && !inputs.dry_run
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false
      - name: Evidenz-Artefakte herunterladen
        uses: actions/download-artifact@v7
        with:
          path: ${{ runner.temp }}/abnahme-evidenz
          pattern: abnahme-*
      - name: Vision-SDK reproduzierbar installieren
        continue-on-error: true
        run: |
          set -euo pipefail
          python3 -m venv "${RUNNER_TEMP}/abnahme-vision-venv"
          "${RUNNER_TEMP}/abnahme-vision-venv/bin/python" -m pip install --upgrade \
            "pip>=26.1.2"
          "${RUNNER_TEMP}/abnahme-vision-venv/bin/python" -m pip install \
            "anthropic==0.117.0"
      - name: Screenshots vorbewerten (Vision, fail-safe)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          set -euo pipefail
          # Kein Key oder API-Fehler ⇒ jedes Kriterium 'unbewertet'; der
          # Lauf bricht nie ab (fail-safe, #646). Falls schon venv-Erzeugung
          # oder SDK-Installation scheiterte, übernimmt System-Python; das
          # Skript degradiert das fehlende SDK kontrolliert zu 'unbewertet'.
          vision_python=python3
          if [ -x "${RUNNER_TEMP}/abnahme-vision-venv/bin/python" ]; then
            vision_python="${RUNNER_TEMP}/abnahme-vision-venv/bin/python"
          fi
          "$vision_python" scripts/abnahme_vision_check.py \
            --screenshots-dir "${RUNNER_TEMP}/abnahme-evidenz" \
            --output "${RUNNER_TEMP}/abnahme-evidenz/vision-verdikte.json"
      - name: Abschlussmatrix erzeugen
        run: |
          set -euo pipefail
          x86flag=""
          [ "${{ vars.ABNAHME_X86_64_ENABLED }}" = "true" ] && x86flag="--x86-64-enabled"
          python3 scripts/abnahme_aggregate.py \
            --artifacts-dir "${RUNNER_TEMP}/abnahme-evidenz" \
            --output "${RUNNER_TEMP}/abschlussmatrix.md" \
            --commit-sha "${GITHUB_SHA}" $x86flag
      - uses: actions/upload-artifact@v6
        with:
          name: abschlussmatrix
          path: ${{ runner.temp }}/abschlussmatrix.md
          if-no-files-found: error
      - name: Matrix als Issue-Kommentar posten
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET_ISSUE: ${{ inputs.target_issue }}
        run: |
          set -euo pipefail
          if [[ ! "$TARGET_ISSUE" =~ ^[1-9][0-9]*$ ]]; then
            echo "::error::target_issue muss eine positive Issue-Nummer sein."
            exit 1
          fi
          gh issue comment "$TARGET_ISSUE" --repo "${GITHUB_REPOSITORY}" \
            --body-file "${RUNNER_TEMP}/abschlussmatrix.md"
