name: Performance Benchmark

on:
  # Woechentlich (Mo 05:17 UTC) – versetzt zum Security-Scan, damit sich die
  # Montags-Jobs nicht draengeln. Vergleicht den frischen Lauf gegen das zuletzt
  # eingecheckte Ergebnis unter benchmarks/results/ und meldet Regressionen.
  schedule:
    - cron: '17 5 * * 1'
  workflow_dispatch:
    inputs:
      threshold:
        description: 'Regressions-Schwelle in Prozent'
        type: string
        default: '10'

permissions:
  contents: read

concurrency:
  group: performance-benchmark
  cancel-in-progress: false

jobs:
  benchmark:
    name: Run and compare benchmark
    runs-on: ubuntu-latest
    permissions:
      # contents: write, um das neue Ergebnis-JSON als Baseline fuer den
      # naechsten Lauf auf einen PR-Branch zu committen; pull-requests: write,
      # um den Baseline-PR zu oeffnen; issues: write fuer die Regressions-Issues.
      contents: write
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip

      - name: "Upgrade pip to a patched release (security: pip>=26.1.2)"
        run: python -m pip install --upgrade "pip>=26.1.2"

      # Qt-Systembibliotheken: das Benchmark-Skript importiert ueber
      # bgremover.image_ops transitiv PyQt6; ohne libgl1/libegl1 scheitert
      # bereits der Import (libGL.so.1). Liste identisch zu den anderen
      # Qt-installierenden Dateien halten (Befund N6,
      # tests/test_ci_qt_packages.py).
      - name: System packages for Qt
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libegl1 libgl1 libfontconfig1 libxkbcommon0 libdbus-1-3 \
            libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-randr0 \
            libxcb-render-util0 libxcb-shape0 libxcb-xinerama0 libxcb-xkb1

      - name: Install package and test extra
        run: make install-test

      # Reproduzierbare Messumgebung (#277/#278/#279): Pillow/NumPy pinnen, damit
      # aufeinanderfolgende Wochenlaeufe vergleichbar bleiben. Der Fingerprint im
      # Ergebnis-JSON haelt die exakten Versionen fest; ein bewusster Sprung setzt
      # die Baseline lediglich zurueck (der Kompatibilitaetscheck meldet dann
      # keine Regression, sondern erfasst eine neue Baseline). Python ist oben auf
      # 3.12 fixiert. Siehe benchmarks/README.md.
      - name: Pin benchmark dependencies (reproducible environment)
        run: python -m pip install "Pillow==12.2.0" "numpy==2.4.6"

      # Eine Auffaelligkeit wird im selben Lauf durch zusaetzliche
      # Wiederholungen bestaetigt (--confirm-runs); gemeldet wird nur, was der
      # Median bestaetigt und was gegen eine *vergleichbare* Baseline laeuft.
      - name: Run benchmark, compare and report regressions
        id: bench
        continue-on-error: true
        env:
          QT_QPA_PLATFORM: offscreen
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          python scripts/benchmark.py run \
            --threshold "${{ inputs.threshold || '10' }}" \
            --confirm-runs 3 \
            --fail-on-regression \
            --post-issues

      - name: Upload benchmark results
        uses: actions/upload-artifact@v7
        with:
          name: benchmark-results
          path: benchmarks/results/
          if-no-files-found: error

      # Das neue Ergebnis wird als Baseline fuer den naechsten Lauf ueber einen
      # PR-Branch vorgeschlagen. Ein direkter Push auf main wuerde an der
      # Branch-Protection scheitern.
      - name: Open benchmark baseline PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add benchmarks/results/
          if git diff --cached --quiet; then
            echo "Kein neues Benchmark-Ergebnis zu committen."
          else
            branch="ci/benchmark-results-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
            git switch -c "$branch"
            git commit -m "ci: Benchmark-Ergebnis erfasst"
            git push --set-upstream origin "$branch"
            gh pr create \
              --base main \
              --head "$branch" \
              --title "ci: Benchmark-Ergebnis erfassen" \
              --body "Automatischer Benchmark-Baseline-PR aus ${GITHUB_WORKFLOW} Run ${GITHUB_RUN_ID}.${GITHUB_RUN_ATTEMPT}."
          fi

      # continue-on-error oben haelt den Job am Leben, damit Commit/Upload noch
      # laufen; hier wird der Job am Ende sichtbar rot, wenn ein Format ueber der
      # Schwelle lag.
      - name: Fail if a format regressed
        if: steps.bench.outcome == 'failure'
        run: |
          echo "::error::Mindestens ein Format hat sich um mehr als die Schwelle verschlechtert."
          exit 1
