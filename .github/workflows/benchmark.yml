name: Performance Benchmark

on:
  # Woechentlich (Mo 05:17 UTC) – versetzt zum Security-Scan, damit sich die
  # Montags-Jobs nicht draengeln. Vergleicht den frischen Lauf gegen das zuletzt
  # eingecheckte Ergebnis unter benchmarks/results/ und meldet Regressionen.
  schedule:
    - cron: '17 5 * * 1'
  workflow_dispatch:
    inputs:
      threshold:
        description: 'Regressions-Schwelle in Prozent'
        type: string
        default: '10'

permissions:
  contents: read

concurrency:
  group: performance-benchmark
  cancel-in-progress: false

jobs:
  benchmark:
    name: Run and compare benchmark
    runs-on: ubuntu-latest
    permissions:
      # contents: read fuer den Checkout; actions: read, um das Ergebnis-Artefakt
      # des letzten erfolgreichen Laufs als gleitende Baseline zurueckzuholen
      # (kein Schreibzugriff auf das geschuetzte main, Issue #545); issues: write
      # fuer die Regressions-Issues. Bewusst KEINE Schreibrechte auf Inhalte oder
      # Pull-Requests – die Branch-Protection bleibt die einzige Schreibschleuse.
      contents: read
      actions: read
      issues: write
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip

      - name: "Upgrade pip to a patched release (security: pip>=26.1.2)"
        run: python -m pip install --upgrade "pip>=26.1.2"

      # Qt-Systembibliotheken: das Benchmark-Skript importiert ueber
      # bgremover.image_ops transitiv PyQt6; ohne libgl1/libegl1 scheitert
      # bereits der Import (libGL.so.1). Liste identisch zu den anderen
      # Qt-installierenden Dateien halten (Befund N6,
      # tests/test_ci_qt_packages.py).
      - name: System packages for Qt
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libegl1 libgl1 libfontconfig1 libxkbcommon0 libdbus-1-3 \
            libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-randr0 \
            libxcb-render-util0 libxcb-shape0 libxcb-xinerama0 libxcb-xkb1

      - name: Install package and test extra
        run: make install-test

      # Reproduzierbare Messumgebung (#277/#278/#279): Pillow/NumPy pinnen, damit
      # aufeinanderfolgende Wochenlaeufe vergleichbar bleiben. Der Fingerprint im
      # Ergebnis-JSON haelt die exakten Versionen fest; ein bewusster Sprung setzt
      # die Baseline lediglich zurueck (der Kompatibilitaetscheck meldet dann
      # keine Regression, sondern erfasst eine neue Baseline). Python ist oben auf
      # 3.12 fixiert. Siehe benchmarks/README.md.
      - name: Pin benchmark dependencies (reproducible environment)
        run: python -m pip install "Pillow==12.2.0" "numpy==2.4.6"

      # Gleitende Baseline OHNE Push auf main (Issue #545): Der geschuetzte
      # main-Branch laesst sich vom GITHUB_TOKEN nicht direkt (noch ueber einen
      # Auto-PR) beschreiben. Statt einzucheckenden Ergebnissen traegt jeder Lauf
      # seine Ergebnisse als Artefakt weiter; vor dem Messen wird das Artefakt des
      # letzten *erfolgreichen* Laufs hierher zurueckgeholt, sodass benchmark.py
      # gegen dessen juengste Datei ("Vorwoche") vergleicht. Faellt der Download
      # aus (erster Lauf nach der Umstellung, abgelaufenes Artefakt), bleibt die
      # eingecheckte Baseline die Referenz – der Job wird dadurch nie rot.
      - name: Restore previous benchmark baseline
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Nur erfolgreiche main-Laeufe kommen als Baseline infrage: ein
          # workflow_dispatch auf einem Feature-Branch darf die main-Baseline
          # nicht mit Messungen aus ungemergtem Code verfaelschen.
          prev="$(gh run list --workflow benchmark.yml --branch main --status success \
            --limit 1 --json databaseId --jq '.[0].databaseId // empty' 2>/dev/null || true)"
          if [ -z "$prev" ]; then
            echo "Kein frueherer erfolgreicher main-Lauf – eingecheckte Baseline bleibt Referenz."
            exit 0
          fi
          echo "Hole Baseline-Artefakt aus Lauf $prev."
          # In ein LEERES Temp-Verzeichnis laden: 'gh run download' kann
          # vorhandene Dateien nicht ueberschreiben (cli/cli#8338), und nach dem
          # Checkout liegen die eingecheckten Baselines – die das Artefakt selbst
          # ebenfalls enthaelt – bereits in benchmarks/results/. Erst danach in
          # die Baseline mergen, damit sie wirklich vorrueckt.
          tmp="$(mktemp -d)"
          if gh run download "$prev" --name benchmark-results --dir "$tmp" 2>/dev/null; then
            cp -f "$tmp"/*.json benchmarks/results/
            echo "Baseline aus Vorlauf uebernommen."
          else
            echo "Kein Baseline-Artefakt im Vorlauf – eingecheckte Baseline bleibt Referenz."
          fi
          rm -rf "$tmp"

      # Eine Auffaelligkeit wird im selben Lauf durch zusaetzliche
      # Wiederholungen bestaetigt (--confirm-runs); gemeldet wird nur, was der
      # Median bestaetigt und was gegen eine *vergleichbare* Baseline laeuft.
      - name: Run benchmark, compare and report regressions
        id: bench
        continue-on-error: true
        env:
          QT_QPA_PLATFORM: offscreen
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          python scripts/benchmark.py run \
            --threshold "${{ inputs.threshold || '10' }}" \
            --confirm-runs 3 \
            --fail-on-regression \
            --post-issues

      - name: Upload benchmark results
        uses: actions/upload-artifact@v7
        with:
          name: benchmark-results
          path: benchmarks/results/
          if-no-files-found: error

      # continue-on-error oben haelt den Job am Leben, damit der Artefakt-Upload
      # noch laeuft; hier wird der Job am Ende sichtbar rot, wenn ein Format ueber
      # der Schwelle lag.
      - name: Fail if a format regressed
        if: steps.bench.outcome == 'failure'
        run: |
          echo "::error::Mindestens ein Format hat sich um mehr als die Schwelle verschlechtert."
          exit 1
