name: Release artifacts (Linux + macOS)

# Builds portable, self-contained artifacts and attaches them to the GitHub
# Release on a version tag (v*):
#   - Linux AppImage + .deb for x86_64 and aarch64 (Raspberry Pi OS / arm64)
#   - macOS .dmg (BgRemover.app) for Apple Silicon (arm64)
# Also runnable on demand via workflow_dispatch. The downloadable artifacts
# bundle the rembg/onnxruntime AI background removal by default.
#
# Artifact naming (#584): ``BgRemover-<version>-<platform_tag>[-ai].<ext>``,
# e.g. ``BgRemover-2.6.0-linux-raspberrypi-arm64-ai.AppImage``. ``platform_tag``
# spells out OS *and* device (``linux-x86_64`` / ``linux-raspberrypi-arm64`` /
# ``macos-arm64``) instead of a bare architecture — a raw ``arm64`` cannot tell
# a Raspberry Pi .deb apart from the macOS .dmg. The ``-ai`` suffix is only
# appended when the AI stack (rembg/onnxruntime) is actually bundled, so it is
# visible per file whether that build has the same integrated AI model as the
# macOS one, instead of only being documented out-of-band.
#
# Release-Gate (#250): Vor jeglichem Build und vor dem Anlegen/Aendern eines
# GitHub Releases gelten zwei harte Vorbedingungen, technisch ueber ``needs``
# erzwungen:
#   1. ``verify-tag`` – der Tag entspricht dem Format ``vX.Y.Z`` und seine
#      Version stimmt mit ``project.version`` aus pyproject.toml ueberein.
#   2. ``test`` – die massgebliche Full-CI-Matrix (ci.yml, als
#      wiederverwendbarer Workflow aufgerufen) ist fuer EXAKT diesen Commit
#      gruen (Linux/macOS x Python 3.10-3.13).
# ``build`` haengt an beiden, ``publish`` haengt an ``build`` und legt das
# Release erst danach an. Schlaegt ein Test oder ein Arch-Build fehl, wird kein
# Release erstellt oder veraendert und keine unvollstaendige Artefaktmenge
# veroeffentlicht.
#
# Der Linux-Build buendelt nur das bgremover-Wheel + Abhaengigkeiten ins
# AppImage; der macOS-Build packt sie via PyInstaller ins .app-Bundle. Beide
# laufen in einem isolierten venv und installieren das Projekt nicht in den
# Runner (kein pip-Pin noetig, vgl. tests/test_ci_pip_pin.py).
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      with_ai:
        description: 'Bundle rembg (AI background removal) into the artifacts'
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  # Gate 1: Tag-Format und Tag/Version-Abgleich. Nur bei Tag-Pushes wirksam
  # (bei workflow_dispatch existiert kein Release-Tag); der Job selbst bleibt
  # gruen, damit der Build-Pfad fuer manuelle Builds nicht per needs-Skip
  # entfaellt.
  verify-tag:
    name: Verify tag matches project version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Tag format and version match
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          set -euo pipefail
          tag_name="${GITHUB_REF_NAME}"
          if [[ ! "$tag_name" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.]+)?$ ]]; then
            echo "::error::Tag '$tag_name' entspricht nicht dem Format vX.Y.Z"
            exit 1
          fi
          project_version="$(python -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])')"
          tag_version="${tag_name#v}"
          if [[ "$project_version" != "$tag_version" ]]; then
            echo "::error::Tag-Version '$tag_version' weicht von project.version '$project_version' ab"
            exit 1
          fi
          echo "Tag $tag_name passt zu project.version $project_version."

  # Gate 2: Massgebliche Full-CI-Matrix fuer exakt diesen Commit – derselbe
  # wiederverwendbare Workflow, den auch der Wochen-Cron faehrt. Haengt an
  # verify-tag: ein ungueltiger oder zur Paketversion unpassender Tag startet
  # die teure Matrix gar nicht erst (#257).
  test:
    needs: verify-tag
    # ci.yml fordert ``id-token: write`` (tokenloser Codecov-OIDC-Upload, #303).
    # Ein per ``uses`` aufgerufener Workflow darf NICHT mehr Rechte verlangen als
    # der Aufrufer gewaehrt – sonst lehnt GitHub den GESAMTEN Run bereits beim
    # Start ab (startup_failure, keine Jobs). Das Recht hier explizit
    # durchreichen, damit das Release-Gate ueberhaupt anlaeuft (und der
    # OIDC-Upload auch im Release-Kontext funktioniert).
    permissions:
      contents: read
      id-token: write
    uses: ./.github/workflows/ci.yml

  # Ein Build-Job mit plattformuebergreifender Matrix: zwei Linux-Arches
  # (AppImage + .deb) und ein macOS-arm64-Leg (.dmg). Bewusst EIN Job, damit
  # ``publish`` per ``needs: build`` auf alle Legs wartet (Release-Gate #250).
  build:
    name: ${{ matrix.os }} ${{ matrix.arch }}
    needs: [verify-tag, test]
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            runner: ubuntu-24.04
            arch: x86_64
            deb_arch: amd64
            platform_tag: linux-x86_64
          - os: linux
            runner: ubuntu-24.04-arm   # native arm64 runner → Raspberry Pi OS
            arch: aarch64
            deb_arch: arm64
            platform_tag: linux-raspberrypi-arm64
          - os: macos
            runner: macos-latest        # native Apple Silicon (arm64)
            arch: arm64
            platform_tag: macos-arm64
    env:
      # appimagetool needs FUSE to run; extract-and-run avoids requiring it
      # (and the FUSE2 package) on the CI runner. Harmlos/ungenutzt auf macOS.
      APPIMAGE_EXTRACT_AND_RUN: '1'
      # #307/#308: ob die Artefakte rembg/onnxruntime bündeln. Dieselbe
      # Bedingung wie der ``--ai``-Schalter der Build-Schritte – steuert den
      # KI-Selbsttest und die erlaubte Instanzzahl des Fork-Bomb-Wächters.
      WITH_AI: ${{ (github.event_name != 'workflow_dispatch' || inputs.with_ai) && '1' || '0' }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      # ── Linux: AppImage + .deb ──────────────────────────────────────────
      - name: Build AppImage
        if: matrix.os == 'linux'
        run: ./packaging/linux/build_appimage.sh ${{ (github.event_name != 'workflow_dispatch' || inputs.with_ai) && '--ai' || '' }}

      - name: Build .deb (wraps the AppImage)
        if: matrix.os == 'linux'
        run: ./packaging/linux/build_deb.sh

      - name: Collect Linux artifacts
        if: matrix.os == 'linux'
        run: |
          mkdir -p dist
          cp build/appimage/*.AppImage dist/
          cp build/deb/*.deb dist/
          ls -lh dist/

      - name: Verify built Linux artifacts
        if: matrix.os == 'linux'
        run: |
          set -euo pipefail
          shopt -s nullglob
          project_version="$(python -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])')"
          appimages=(dist/*.AppImage)
          debs=(dist/*.deb)
          test "${#appimages[@]}" -eq 1 || { echo "::error::erwarte genau ein AppImage, habe ${#appimages[@]}"; exit 1; }
          test "${#debs[@]}" -eq 1 || { echo "::error::erwarte genau ein .deb, habe ${#debs[@]}"; exit 1; }
          appimage="${appimages[0]}"
          deb="${debs[0]}"
          # Dateiname traegt Version, ein eindeutiges OS+Geraet-Tag (#584: kein
          # rohes "arm64", das Linux/Raspi und macOS gleichermassen meinen
          # koennte) und den KI-Bündelstatus.
          ai_suffix=""
          [ "$WITH_AI" = "1" ] && ai_suffix="-ai"
          expected_appimage="BgRemover-${project_version}-${{ matrix.platform_tag }}${ai_suffix}.AppImage"
          test "$(basename "$appimage")" = "$expected_appimage" \
            || { echo "::error::AppImage-Name '$(basename "$appimage")' != '$expected_appimage'"; exit 1; }
          expected_deb="BgRemover-${project_version}-${{ matrix.platform_tag }}${ai_suffix}.deb"
          test "$(basename "$deb")" = "$expected_deb" \
            || { echo "::error::.deb-Name '$(basename "$deb")' != '$expected_deb'"; exit 1; }
          # AppImage ist ausfuehrbar.
          test -x "$appimage" || { echo "::error::AppImage ist nicht ausfuehrbar"; exit 1; }
          # Debian-Metadaten lesbar und plausibel.
          dpkg-deb --info "$deb" >/dev/null
          test "$(dpkg-deb --field "$deb" Package)" = "bgremover"
          test "$(dpkg-deb --field "$deb" Version)" = "$project_version"
          test "$(dpkg-deb --field "$deb" Architecture)" = "${{ matrix.deb_arch }}"
          echo "Artefakte verifiziert: $(basename "$appimage"), $(basename "$deb")"

      # Qt-Laufzeitbibliotheken für den offscreen-Smoke-Launch des AppImage.
      # Das python-appimage bündelt CPython + PyQt6, aber das offscreen-Plugin
      # linkt System-libGL/-libEGL/Fontconfig/xkbcommon/D-Bus; ohne sie scheitert
      # der Start mit ``libGL.so.1: cannot open shared object file``. Bewusst nur
      # die offscreen-relevante Teilmenge der Qt-Lib-Liste (keine xcb-Familie –
      # die braucht nur die xcb-Plattform), daher kein N6-Drift-Bezug.
      - name: Install Qt runtime libs for the offscreen smoke launch
        if: matrix.os == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libegl1 libgl1 libfontconfig1 libxkbcommon0 libdbus-1-3

      # #307: das frisch gebaute AppImage headless starten (offscreen +
      # BGREMOVER_SMOKE_TEST) und über den Watchdog auf Start-Crash (#304),
      # Fork-Bomb (#305) und Nicht-Terminieren prüfen. #308: im --ai-Build
      # zusätzlich den KI-Selbsttest über den Spawn-Kindprozess fahren (rembg-
      # Kette inkl. pymatting-Metadaten importierbar). Schlägt einer fehl, fällt
      # der build-Job und ``publish`` (needs: build) veröffentlicht nichts.
      - name: Smoke-launch built AppImage (headless, fork-bomb guard)
        if: matrix.os == 'linux'
        run: |
          set -euo pipefail
          appimage="$(ls -1 dist/*.AppImage | head -1)"
          max_instances=1
          if [ "$WITH_AI" = "1" ]; then
            max_instances=5   # GUI + KI-Warmup-Kind (+ mp-Resource-Tracker)
            echo ">> KI-Selbsttest (#308): rembg-Kette im Spawn-Kindprozess importierbar?"
            QT_QPA_PLATFORM=offscreen BGREMOVER_AI_SELFCHECK=1 \
              "$appimage" --appimage-extract-and-run
          fi
          python3 scripts/smoke_launch.py \
            --match "$(basename "$appimage")" \
            --max-instances "$max_instances" \
            --timeout 120 \
            -- "$appimage" --appimage-extract-and-run

      # ── macOS: .app + .dmg ──────────────────────────────────────────────
      - name: Build macOS app + .dmg (PyInstaller)
        if: matrix.os == 'macos'
        run: ./packaging/mac/build_macos.sh ${{ (github.event_name != 'workflow_dispatch' || inputs.with_ai) && '--ai' || '' }}

      - name: Collect macOS artifact
        if: matrix.os == 'macos'
        run: |
          mkdir -p dist
          cp build/macos/*.dmg dist/
          ls -lh dist/

      - name: Verify built macOS artifact
        if: matrix.os == 'macos'
        run: |
          set -euo pipefail
          shopt -s nullglob
          project_version="$(python -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])')"
          dmgs=(dist/*.dmg)
          test "${#dmgs[@]}" -eq 1 || { echo "::error::erwarte genau ein .dmg, habe ${#dmgs[@]}"; exit 1; }
          dmg="${dmgs[0]}"
          ai_suffix=""
          [ "$WITH_AI" = "1" ] && ai_suffix="-ai"
          expected_dmg="BgRemover-${project_version}-${{ matrix.platform_tag }}${ai_suffix}.dmg"
          test "$(basename "$dmg")" = "$expected_dmg" \
            || { echo "::error::DMG-Name '$(basename "$dmg")' != '$expected_dmg'"; exit 1; }
          hdiutil imageinfo "$dmg" >/dev/null
          echo "macOS-Artefakt verifiziert: $(basename "$dmg")"

      # #307: das gebaute BgRemover.app headless starten (offscreen +
      # BGREMOVER_SMOKE_TEST) und über den Watchdog auf Start-Crash (#304) und
      # Fork-Bomb (#305) prüfen. Die macOS-.dmg war der ursprüngliche Fork-Bomb-
      # Vektor (fehlendes freeze_support → spawn relauncht die GUI). #308: im
      # --ai-Build zusätzlich den KI-Selbsttest fahren. Fällt einer durch, fällt
      # der build-Job → ``publish`` (needs: build) veröffentlicht nichts.
      - name: Smoke-launch built macOS app (headless, fork-bomb guard)
        if: matrix.os == 'macos'
        run: |
          set -euo pipefail
          app_bin="build/macos/dist/BgRemover.app/Contents/MacOS/BgRemover"
          test -x "$app_bin" || { echo "::error::App-Binary fehlt: $app_bin"; exit 1; }
          max_instances=1
          if [ "$WITH_AI" = "1" ]; then
            max_instances=5   # GUI + KI-Warmup-Kind (+ mp-Resource-Tracker)
            echo ">> KI-Selbsttest (#308): rembg-Kette im Spawn-Kindprozess importierbar?"
            QT_QPA_PLATFORM=offscreen BGREMOVER_AI_SELFCHECK=1 "$app_bin"
          fi
          python3 scripts/smoke_launch.py \
            --match "Contents/MacOS/BgRemover" \
            --max-instances "$max_instances" \
            --timeout 120 \
            -- "$app_bin"

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v7
        with:
          name: bgremover-${{ matrix.platform_tag }}
          path: dist/*
          if-no-files-found: error

  # Publish nur fuer Tag-Pushes und erst nachdem ALLE build-Matrixlegs gruen
  # sind (needs: build). Damit kann keine unvollstaendige Artefaktmenge in ein
  # Release gelangen.
  publish:
    name: Publish GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write  # create/upload GitHub Release assets
      actions: read    # download-artifact per run-id über die Actions-API
    env:
      GH_TOKEN: ${{ github.token }}
      # GH_REPO setzt den Repo-Kontext explizit, damit ``gh release
      # view/create/edit/upload`` auf einem frischen Runner zuverlaessig das
      # richtige Repository ansprechen (#257) – unabhaengig vom Checkout-Remote.
      GH_REPO: ${{ github.repository }}
    steps:
      # Checkout nur fuer CHANGELOG.md + scripts/: der Release-Body wird aus dem
      # passenden ``## [X.Y.Z]``-Abschnitt abgeleitet (#311), nicht mehr aus
      # einem hardcodierten Text.
      - uses: actions/checkout@v5

      - name: Download built artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: bgremover-*
          path: dist
          merge-multiple: true
          # run-id + github-token laden die Artefakte des GESAMTEN Runs ueber
          # die API – also auch die eines vorherigen, bereits erfolgreichen
          # Attempts nach „Re-run failed jobs“. Ohne dies sieht download-artifact
          # nur den aktuellen Attempt und faende die im ersten Lauf gebauten
          # Artefakte nicht mehr (#257).
          run-id: ${{ github.run_id }}
          github-token: ${{ github.token }}

      - name: Verify complete artifact set
        run: |
          set -euo pipefail
          shopt -s nullglob
          appimages=(dist/*.AppImage)
          debs=(dist/*.deb)
          dmgs=(dist/*.dmg)
          test "${#appimages[@]}" -eq 2 \
            || { echo "::error::erwarte 2 AppImages (x86_64+aarch64), habe ${#appimages[@]}"; exit 1; }
          test "${#debs[@]}" -eq 2 \
            || { echo "::error::erwarte 2 .deb-Pakete (amd64+arm64), habe ${#debs[@]}"; exit 1; }
          test "${#dmgs[@]}" -eq 1 \
            || { echo "::error::erwarte 1 .dmg (macOS arm64), habe ${#dmgs[@]}"; exit 1; }
          ls -lh dist/

      # #311: Release-Body aus dem CHANGELOG-Abschnitt der Tag-Version ableiten.
      # Fehlt ``## [X.Y.Z]``, bricht das Skript hart ab (Exit 2) – kein stiller
      # generischer Fallback, der Publish-Job faellt klar.
      - name: Derive release notes from CHANGELOG
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          python3 scripts/extract_release_notes.py "$version" > release-notes.md
          echo ">> Release-Notes fuer $version aus CHANGELOG.md abgeleitet:"
          cat release-notes.md

      - name: Create or reuse the GitHub Release
        run: |
          set -euo pipefail
          # Der Body wird IMMER aus dem CHANGELOG gesetzt – auch beim Reuse eines
          # bereits existierenden Releases (#311). Fehler von ``gh release`` werden
          # NICHT pauschal verschluckt: ein existierendes Release wird explizit
          # erkannt und sein Body via ``gh release edit`` aktualisiert, jeder
          # andere Fehler bricht den Job ab.
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            echo "Release $GITHUB_REF_NAME existiert bereits – Body + Assets werden aktualisiert."
            gh release edit "$GITHUB_REF_NAME" --notes-file release-notes.md
          else
            gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" \
              --notes-file release-notes.md --verify-tag
          fi

      - name: Upload artifacts to the Release
        run: |
          set -euo pipefail
          gh release upload "$GITHUB_REF_NAME" dist/* --clobber
