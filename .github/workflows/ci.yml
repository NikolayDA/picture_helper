name: Full CI

# Massgebliche Vollmatrix: Linux + macOS x Python 3.10-3.13.
#
# Release-Gate (#250): Diese Matrix ist als wiederverwendbarer Workflow
# (``workflow_call``) angelegt. Der Release-Workflow (release-linux.yml) ruft sie
# beim Push eines Versions-Tags auf und haengt Build/Publish per ``needs`` daran –
# so werden Linux-Artefakte erst veroeffentlicht, wenn die volle Matrix fuer
# EXAKT denselben Commit gruen ist. Ein eigenstaendiger Tag-/Release-Trigger
# entfaellt hier bewusst, damit die Matrix nicht doppelt (und ungegated) laeuft.
#
# O3: Zusaetzlich laeuft die Matrix woechentlich (So 06:00 UTC) als
# Drift-Fruehwarnung gegen Regressionen unter macOS oder Python 3.10/3.13 und
# auf Abruf (``workflow_dispatch``). Pull Requests deckt der separate pr-ci.yml ab.
on:
  workflow_call:
  schedule:
    - cron: '0 6 * * 0'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: "Upgrade pip to a patched release (security: pip>=26.1.2)"
        run: python -m pip install --upgrade "pip>=26.1.2"

      - name: System packages for Qt + zsh + shellcheck (Linux only)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libegl1 libgl1 libfontconfig1 libxkbcommon0 libdbus-1-3 \
            libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-randr0 \
            libxcb-render-util0 libxcb-shape0 libxcb-xinerama0 libxcb-xkb1 \
            zsh shellcheck

      - name: Run check suite
        run: make pr-check

      - name: Coverage
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        run: make coverage

      - name: Upload coverage HTML
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: htmlcov
          if-no-files-found: error
