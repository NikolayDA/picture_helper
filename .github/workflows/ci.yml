name: Full CI

on:
  # Release-Gate: Die Vollmatrix laeuft bereits beim Pushen eines
  # Versions-Tags (Release-Kandidat) – also VOR dem Veroeffentlichen des
  # Releases. So ist sie ein echtes Gate und nicht erst nach Publikation.
  push:
    tags:
      - 'v*'
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: System packages for Qt + zsh + shellcheck (Linux only)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libegl1 libfontconfig1 libxkbcommon0 libdbus-1-3 \
            libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-randr0 \
            libxcb-render-util0 libxcb-shape0 libxcb-xinerama0 libxcb-xkb1 \
            zsh shellcheck

      - name: Run check suite
        run: make pr-check

      - name: Coverage
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        run: make coverage

      - name: Upload coverage HTML
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: htmlcov
          if-no-files-found: error
